<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wishup Resource Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --ink: #0e0e0e;
      --accent: #d4521a;
      --card: #ffffff;
      --muted: #6b6560;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 20%, rgba(212,82,26,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(14,14,14,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      max-width: 680px;
      width: 100%;
      position: relative;
    }

    .header {
      margin-bottom: 60px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 2px;
      background: var(--accent);
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(38px, 6vw, 62px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 16px;
      font-size: 16px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
    }

    .resources {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 16px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: var(--ink);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--accent);
      transform: scaleY(0);
      transition: transform 0.25s ease;
      border-radius: 4px 0 0 4px;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      border-color: rgba(212,82,26,0.2);
    }

    .card:hover::before {
      transform: scaleY(1);
    }

    .card-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .card-icon {
      width: 48px;
      height: 48px;
      background: rgba(212,82,26,0.08);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
    }

    .arrow {
      font-size: 20px;
      color: var(--accent);
      opacity: 0;
      transform: translateX(-8px);
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .card:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .footer {
      margin-top: 60px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header { animation: fadeUp 0.6s ease forwards; }
    .card:nth-child(1) { animation: fadeUp 0.6s ease 0.1s both; }
    .card:nth-child(2) { animation: fadeUp 0.6s ease 0.2s both; }
    .card:nth-child(3) { animation: fadeUp 0.6s ease 0.3s both; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">Wishup</div>
      <h1>Resource <span>Hub</span></h1>
      <p class="subtitle">Internal tools and guides for the Wishup content & growth team.</p>
    </div>

    <div class="resources">
      <a class="card" href="va-intelligence-engine.html">
        <div class="card-left">
          <div class="card-icon">🧠</div>
          <div>
            <div class="card-title">VA Intelligence Engine</div>
            <div class="card-desc">Smart framework for virtual assistant content strategy</div>
          </div>
        </div>
        <div class="arrow">→</div>
      </a>
    </div>

    <div class="footer">Wishup Internal · 2026</div>
  </div>
</body>
</html>
